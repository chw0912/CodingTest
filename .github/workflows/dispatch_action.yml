name: dispatch_action

on:
 push:
   branches:
     - main

jobs:
 dispatch:
   runs-on: ubuntu-latest
   steps:
     - name: Trigger repository dispatch
       uses: peter-evans/repository-dispatch@v4
       with:
         token: ${{ secrets.GH_PAT }}
         repository: ${{ secrets.GH_REPOSITORY }}
         event-type: trigger-workflow
